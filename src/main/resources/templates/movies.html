<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movies – moviesdb</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        h1 { color: #333; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background-color: #4a90d9; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        nav a { margin-right: 15px; text-decoration: none; color: #4a90d9; font-weight: bold; }
    </style>
</head>
<body>
<nav>
    <a href="/movies">Movies</a>
    <a href="/studios">Studios</a>
    <a href="/people">People</a>
</nav>
<h1>Movies</h1>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Titel</th>
            <th>Jahr</th>
            <th>Plot</th>
            <th>IMDB Rating</th>
            <th>IMDB Votes</th>
            <th>Schauspieler</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="movie : ${movies}">
            <td th:text="${movie.id}"></td>
            <td th:text="${movie.title}"></td>
            <td th:text="${movie.releaseYear}"></td>
            <td th:text="${movie.plot}"></td>
            <td th:text="${movie.imdb != null ? movie.imdb.rating : '-'}"></td>
            <td th:text="${movie.imdb != null ? movie.imdb.votes : '-'}"></td>
            <td>
                <span th:each="actor, iter : ${movie.actors}">
                    <span th:text="${actor.as}"></span><span th:if="${!iter.last}">, </span>
                </span>
            </td>
        </tr>
    </tbody>
</table>
</body>
</html>
